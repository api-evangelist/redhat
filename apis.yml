features:
  - name: Subscription Management
    description: >-
      Manage Red Hat product subscriptions, allocations, manifests, and
      historical usage reporting across hybrid environments.
  - name: System Inventory
    description: >-
      Query and manage registered Red Hat Enterprise Linux and OpenShift
      systems across on-premise, cloud, and edge environments.
  - name: Insights and Advisor
    description: >-
      Programmatic access to Red Hat Insights analytics, recommendations,
      and remediations for RHEL fleets.
  - name: Vulnerability and Patch
    description: >-
      Track CVE exposure and patch compliance across the Red Hat fleet
      via the Hybrid Cloud Console APIs.
  - name: RBAC and Identity
    description: >-
      Manage roles, groups, principals, and permissions across the
      Hybrid Cloud Console using the RBAC API.
  - name: Notifications and Integrations
    description: >-
      Configure notification behaviors, endpoints, and integrations
      with Slack, Microsoft Teams, ServiceNow, Splunk, and webhooks.
solutions:
  - name: Enterprise Linux Operations
    description: >-
      Automate registration, patching, and lifecycle management of
      Red Hat Enterprise Linux systems via Hybrid Cloud Console APIs.
  - name: OpenShift Fleet Management
    description: >-
      Monitor and manage OpenShift clusters, costs, and subscriptions
      from a centralized control plane via APIs.
  - name: Subscription Cost Optimization
    description: >-
      Pull subscription, entitlement, and usage data to optimize
      committed spend and consumption across hybrid environments.
useCases:
  - name: CMDB Synchronization
    description: >-
      Sync Red Hat system inventory and subscription state into an
      external CMDB via inventory and subscription management APIs.
  - name: Vulnerability Reporting
    description: >-
      Programmatically extract CVE exposure and remediation status
      across a Red Hat estate for security reporting.
  - name: Automated Subscription Provisioning
    description: >-
      Provision and deprovision subscriptions, manifests, and
      allocations from CI/CD or provisioning workflows.
integrations:
  - name: ServiceNow
    description: Notification and incident integration with ServiceNow
  - name: Slack
    description: Hybrid Cloud Console notification routing to Slack
  - name: Microsoft Teams
    description: Notification routing to Microsoft Teams
  - name: Splunk
    description: Stream Hybrid Cloud Console events to Splunk
  - name: Webhooks
    description: Generic webhook delivery for Console notifications
