aid: redhat
name: Red Hat
description: >-
  Red Hat is an IBM subsidiary providing enterprise open source software
  including Red Hat Enterprise Linux, OpenShift, and Ansible Automation
  Platform, with cloud services managed through the Red Hat Hybrid Cloud
  Console. The Hybrid Cloud Console exposes REST APIs for subscription
  management, system inventory, vulnerability and patch management,
  notifications, RBAC, and other cloud services across hybrid environments.
  APIs use token-based authentication via service accounts (OAuth 2.0 /
  OIDC) following Red Hat's transition away from basic authentication.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Red Hat
  - Hybrid Cloud
  - Subscription Management
  - Enterprise Linux
  - OpenShift
  - Cloud Services
  - IBM
url: >-
  https://raw.githubusercontent.com/api-evangelist/redhat/refs/heads/main/apis.yml
created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: redhat:hybrid-cloud-console
    name: Red Hat Hybrid Cloud Console API
    description: >-
      REST API surface for the Red Hat Hybrid Cloud Console at
      console.redhat.com providing access to inventory, insights, patch,
      vulnerability, notifications, RBAC, sources, and other cloud services.
      Uses token-based authentication via service accounts (OAuth 2.0).
    humanURL: https://console.redhat.com/docs/api
    baseURL: https://console.redhat.com/api
    tags:
      - Hybrid Cloud
      - Cloud Services
      - Inventory
      - Insights
      - RBAC
      - Notifications
    properties:
      - type: Documentation
        url: https://console.redhat.com/docs/api
      - type: Getting Started
        url: https://docs.redhat.com/en/documentation/red_hat_hybrid_cloud_console/1-latest/html-single/getting_started_with_the_red_hat_hybrid_cloud_console/index
      - type: Authentication
        url: https://access.redhat.com/articles/7036194
  - aid: redhat:subscription-management
    name: Red Hat Subscription Management API
    description: >-
      REST API for managing Red Hat subscriptions, allocations, manifests,
      and usage reporting via Subscription Services in the Hybrid Cloud
      Console. Uses OAuth 2.0 / OIDC-compatible service account tokens.
    humanURL: https://docs.redhat.com/en/documentation/subscription_central/1-latest/html-single/using_apis_in_red_hat_subscription_management/index
    baseURL: https://console.redhat.com/api/rhsm/v2
    tags:
      - Subscription Management
      - Entitlements
      - Allocations
      - Manifests
    properties:
      - type: Documentation
        url: https://docs.redhat.com/en/documentation/subscription_central/1-latest/html-single/using_apis_in_red_hat_subscription_management/index
      - type: Getting Started
        url: https://access.redhat.com/articles/3626371

